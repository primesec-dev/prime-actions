name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/lint-and-test.yml

  test-action:
    name: Test Action
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run PR Password Scanner
        id: scanner
        uses: ./
        with:
          timeout: "30"

      - name: Check outputs
        run: |
          echo "Total lines: ${{ steps.scanner.outputs.total-lines }}"
          echo "Password findings: ${{ steps.scanner.outputs.password-findings }}"
